<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AspirantPulse AI</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #212121;
            --tg-theme-button-color: #007aff;
            --tg-theme-secondary-bg-color: #f1f1f4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Screen Management */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease-in; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .hero-title { font-size: 24px; font-weight: 800; text-align: center; margin: 20px 0 10px; color: var(--tg-theme-button-color); }
        .hero-sub { text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 30px; }
        
        .btn {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 15px; padding: 20px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); border-color: var(--tg-theme-button-color); }
        .btn-text { font-weight: 600; font-size: 16px; }
        .btn-icon { font-size: 24px; }

        /* News Cards */
        .news-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px; padding: 16px; margin-bottom: 16px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .badge-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .badge { background: #E3F2FD; color: #1976D2; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .gs-tag { color: var(--tg-theme-button-color); font-size: 11px; font-weight: bold; }
        .news-title { font-size: 17px; font-weight: 700; margin: 0 0 8px 0; line-height: 1.3; }
        .news-summary { font-size: 14px; line-height: 1.5; opacity: 0.8; margin: 0; }

        /* Loader */
        .loader { text-align: center; padding: 40px; opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>

    <!-- SCREEN 1: Main Category Selection -->
    <div id="screen-main" class="screen active">
        <div class="hero-title">AspirantPulse AI</div>
        <div class="hero-sub">Select your target examination</div>
        
        <div class="btn" onclick="fetchNews('UPSC')">
            <span class="btn-text">UPSC Civil Services</span>
            <span class="btn-icon">🏛️</span>
        </div>
        
        <div class="btn" onclick="showScreen('screen-states')">
            <span class="btn-text">State PCS</span>
            <span class="btn-icon">🗺️</span>
        </div>
    </div>

    <!-- SCREEN 2: State Selection -->
    <div id="screen-states" class="screen">
        <div class="hero-title">Select State</div>
        <div class="hero-sub">Choose your specific state PCS</div>
        
        <div class="btn" onclick="fetchNews('PCS', 'UP')">
            <span class="btn-text">Uttar Pradesh (UPPSC)</span>
            <span class="btn-icon">🦁</span>
        </div>
        
        <div class="btn" onclick="fetchNews('PCS', 'Bihar')">
            <span class="btn-text">Bihar (BPSC)</span>
            <span class="btn-icon">☸️</span>
        </div>

        <button style="width: 100%; padding: 12px; border: none; background: none; color: var(--tg-theme-button-color); font-weight: 600;" onclick="showScreen('screen-main')">← Back to Exams</button>
    </div>

    <!-- SCREEN 3: News Feed -->
    <div id="screen-news" class="screen">
        <div id="news-header" class="hero-title" style="font-size: 20px; text-align: left;">Latest Updates</div>
        <div id="news-container"></div>
        <button style="width: 100%; padding: 20px; border: none; background: none; color: var(--tg-theme-button-color); font-weight: 600;" onclick="showScreen('screen-main')">← Back to Selection</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full height
        tg.ready();

        const BACKEND_URL = "https://aspirant-pulse-app-production.up.railway.app/api/news";

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        async function fetchNews(type, state = '') {
            const container = document.getElementById('news-container');
            const header = document.getElementById('news-header');
            
            header.innerText = state ? `${state} PCS Updates` : `Top 5 UPSC Updates`;
            container.innerHTML = `<div class="loader">Fetching latest...</div>`;
            showScreen('screen-news');
        
            try {
                const url = `${BACKEND_URL}?type=${type}&state=${state}`;
                // Adding mode: 'cors' helps some browsers handle the cross-origin request
                const response = await fetch(url, { mode: 'cors' });
                
                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }
                
                const data = await response.json();
        
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="loader">No news found for this category.</div>`;
                    return;
                }
        
                container.innerHTML = data.map(item => `
                    <div class="news-card">
                        <div class="badge-row">
                            <span class="badge">${item.exam_type}</span>
                            <span class="gs-tag">${item.gs_paper || 'GS'}</span>
                        </div>
                        <h3 class="news-title">${item.headline}</h3>
                        <p class="news-summary">${item.ai_summary}</p>
                    </div>
                `).join('');
        
            } catch (error) {
                console.error("Fetch failed:", error);
                // This alert will show up on your phone so you can see the real error
                container.innerHTML = `<div class="loader" style="color:red;">
                    Connection Error: ${error.message}<br>
                    <small>Check if Backend is running at Railway</small>
                </div>`;
            }
        }
    </script>
</body>
</html>
