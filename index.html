<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        .hidden { display: none; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .tag { font-size: 10px; background: #e3f2fd; color: #1976d2; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="screen-main">
        <h2>Select Category</h2>
        <button class="btn" onclick="fetchNews('UPSC')">UPSC (Top 5 Today)</button>
        <button class="btn" onclick="showStates()">State PCS</button>
    </div>

    <div id="screen-states" class="hidden">
        <button onclick="backToMain()">⬅ Back</button>
        <h2>Select State</h2>
        <button class="btn" onclick="fetchNews('PCS', 'UP')">Uttar Pradesh</button>
        <button class="btn" onclick="fetchNews('PCS', 'Bihar')">Bihar</button>
    </div>

    <div id="screen-news" class="hidden">
        <button onclick="backToMain()">⬅ Back</button>
        <div id="news-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showStates() {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-states').classList.remove('hidden');
        }

        function backToMain() {
            document.querySelectorAll('div[id^="screen-"]').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-main').classList.remove('hidden');
        }

        async function fetchNews(type, state = '') {
            const res = await fetch(`YOUR_BACKEND_URL/api/news?type=${type}&state=${state}`);
            const data = await res.json();
            
            const list = document.getElementById('news-list');
            list.innerHTML = `<h2>${state || type} News</h2>`;
            data.forEach(item => {
                list.innerHTML += `
                    <div class="card">
                        <span class="tag">${item.gs_paper}</span>
                        <h3>${item.headline}</h3>
                        <p>${item.ai_summary}</p>
                    </div>`;
            });
            document.getElementById('screen-states').classList.add('hidden');
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-news').classList.remove('hidden');
        }
    </script>
</body>
</html>
