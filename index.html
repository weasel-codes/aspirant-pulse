<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AspirantPulse AI</title>
    <!-- Official Telegram Mini App SDK (2026 Edition) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #212121;
            --tg-theme-button-color: #007aff;
            --tg-theme-secondary-bg-color: #f1f1f4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 0;
        }

        /* Screen Transitions */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease-in; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons & Grid */
        .btn {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 15px; padding: 18px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); border-color: var(--tg-theme-button-color); }
        .state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .state-btn { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px 5px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }

        /* Question Cards */
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .option { width: 100%; text-align: left; padding: 12px; margin-top: 8px; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; background: white; cursor: pointer; }
        .correct { background: #d4edda !important; color: #155724; }
        .wrong { background: #f8d7da !important; color: #721c24; }
        .explanation { margin-top: 10px; padding: 10px; border-top: 1px dashed #ccc; font-size: 12px; display: none; }

        .hero-title { font-size: 22px; font-weight: 800; text-align: center; margin: 20px 0 5px; color: var(--tg-theme-button-color); }
        .hero-sub { text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <!-- SCREEN 1: Main Exam Selection -->
    <div id="screen-main" class="screen active">
        <div class="hero-title">AspirantPulse AI</div>
        <div class="hero-sub">Choose your target goal</div>
        <div class="btn" onclick="selectExam('UPSC')"><span class="btn-text">UPSC Civil Services</span><span>🏛️</span></div>
        <div class="btn" onclick="showScreen('screen-states')"><span class="btn-text">State PCS</span><span>🗺️</span></div>
    </div>

    <!-- SCREEN 2: State Selection (28 States) -->
    <div id="screen-states" class="screen">
        <div class="hero-title">Select State</div>
        <div class="state-grid" id="state-list"></div>
        <button onclick="showScreen('screen-main')" style="width:100%; padding:15px; border:none; background:none; color:var(--tg-theme-button-color); font-weight:700;">← Back</button>
    </div>

    <!-- SCREEN 2.5: Choice Menu (CA or PYQ) -->
    <div id="screen-choice" class="screen">
        <div id="choice-header" class="hero-title">Choose Content</div>
        <div class="btn" onclick="handleChoice('CA')"><span class="btn-text">Current Affairs</span><span>📰</span></div>
        <div class="btn" onclick="handleChoice('PYQ')"><span class="btn-text">Previous Year (PYQ)</span><span>📝</span></div>
        <button onclick="goBackFromChoice()" style="width:100%; padding:15px; border:none; background:none; color:var(--tg-theme-button-color); font-weight:700;">← Back</button>
    </div>

    <!-- SCREEN 3: Feeds (News & PYQ) -->
    <div id="screen-feed" class="screen">
        <div id="feed-header" class="hero-title" style="text-align:left; font-size:18px;">Latest</div>
        <div id="feed-container"></div>
        <button onclick="showScreen('screen-choice')" style="width:100%; padding:15px; border:none; background:none; color:var(--tg-theme-button-color); font-weight:700;">← Back</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_BASE = "https://aspirant-pulse-app-production.up.railway.app";
        let currentType = '';
        let currentState = '';

        const states = ["Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal"];

        // Initialize State Buttons
        document.getElementById('state-list').innerHTML = states.map(s => `<div class="state-btn" onclick="selectExam('PCS', '${s}')">${s}</div>`).join('');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function selectExam(type, state = '') {
            currentType = type;
            currentState = state;
            document.getElementById('choice-header').innerText = state || "UPSC Exam";
            showScreen('screen-choice');
        }

        function goBackFromChoice() { currentType === 'UPSC' ? showScreen('screen-main') : showScreen('screen-states'); }

        async function handleChoice(choice) {
            const container = document.getElementById('feed-container');
            const header = document.getElementById('feed-header');
            container.innerHTML = "<p style='text-align:center;'>Loading...</p>";
            showScreen('screen-feed');

            const url = choice === 'CA' 
                ? `${API_BASE}/news?type=${currentType}&state=${currentState}`
                : `${API_BASE}/pyqs?type=${currentType}&state=${currentState}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                header.innerText = choice === 'CA' ? "Latest Updates" : "PYQ Practice";
                
                if (data.length === 0) container.innerHTML = "<p style='text-align:center;'>No records found.</p>";
                else choice === 'CA' ? renderNews(data, container) : renderPYQs(data, container);
            } catch (e) { container.innerHTML = "<p style='color:red;'>Connection Error.</p>"; }
        }

        function renderNews(data, div) {
            div.innerHTML = data.map(n => `<div class="card">
                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; margin-bottom:5px;">
                    <span style="color:#1976d2;">${n.exam_type}</span><span>${n.gs_paper || 'GS'}</span>
                </div>
                <h3 style="font-size:16px; margin:0 0 8px;">${n.headline}</h3>
                <p style="font-size:13px; opacity:0.8; margin:0;">${n.ai_summary}</p>
            </div>`).join('');
        }

        function renderPYQs(data, div) {
            div.innerHTML = data.map((q, i) => `<div class="card">
                <div style="font-size:11px; font-weight:700; margin-bottom:10px;">${q.year} | ${q.subject}</div>
                <p style="font-weight:600; margin-bottom:12px;">${q.question_text}</p>
                ${Object.entries(q.options).map(([k, v]) => `
                    <button class="option" onclick="check(this, '${q.correct_option}', '${k}', ${i})">${k}) ${v}</button>
                `).join('')}
                <div id="expl-${i}" class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>
            </div>`).join('');
        }

        function check(btn, correct, sel, id) {
            const card = btn.parentElement;
            card.querySelectorAll('.option').forEach(b => b.disabled = true);
            if (sel === correct) { btn.classList.add('correct'); tg.HapticFeedback.notificationOccurred('success'); } 
            else { btn.classList.add('wrong'); tg.HapticFeedback.notificationOccurred('error'); card.querySelectorAll('.option').forEach(b => { if(b.innerText.startsWith(correct)) b.classList.add('correct'); }); }
            document.getElementById(`expl-${id}`).style.display = 'block';
        }
    </script>
</body>
</html>
