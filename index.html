<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - UPSC/PCS Exam Preparation</title>
</head>
<body>
    <header>
        <h1>UPSC/PCS Exam Preparation Mini App</h1>
    </header>
    <main>
        <section id="goal-selection">
            <h2>Select Your Goal</h2>
            <form>
                <label>
                    <input type="radio" name="goal" value="upsc"> UPSC
                </label>
                <label>
                    <input type="radio" name="goal" value="pcs"> PCS
                </label>
            </form>
        </section>
        <section id="state-selection">
            <h2>Select Your State</h2>
            <form>
                <select name="state">
                    <option value="state1">State 1</option>
                    <option value="state2">State 2</option>
                    <option value="state3">State 3</option>
                </select>
            </form>
        </section>
        <section id="news-dashboard">
            <h2>Latest News</h2>
            <ul>
                <li>News Article 1</li>
                <li>News Article 2</li>
                <li>News Article 3</li>
            </ul>
        </section>
    </main>
</body>
</html>
